[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "botas"
version = "0.1.0"
description = "Lightweight library for building Microsoft Bot Framework bots - Python"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "rido-min" }]
keywords = ["bot", "bot-framework", "microsoft-teams", "chatbot"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Chat",
]
dependencies = [
    "httpx>=0.27",
    "PyJWT[crypto]>=2.8",
    "msal>=1.28",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/rido-min/botas"
Repository = "https://github.com/rido-min/botas"
Issues = "https://github.com/rido-min/botas/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.11",
]

[tool.hatch.build.targets.wheel]
packages = ["src/botas"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
