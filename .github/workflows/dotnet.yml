name: dotnet CI

on:
  push:
    branches: [main]
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: dotnet

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Botas.slnx

      - name: Build
        run: dotnet build Botas.slnx --no-restore

      - name: Test
        run: dotnet test Botas.slnx --no-build
